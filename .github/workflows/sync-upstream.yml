name: Sync Upstream cmux Skills

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get pinned version
        id: pinned
        run: |
          PINNED=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['cmux_version'])")
          echo "version=$PINNED" >> "$GITHUB_OUTPUT"

      - name: Get latest upstream release
        id: upstream
        run: |
          LATEST=$(gh api repos/manaflow-ai/cmux/releases --jq '[.[] | select(.tag_name | startswith("v")) | select(.tag_name | test("nightly") | not)] | .[0].tag_name')
          VERSION="${LATEST#v}"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.pinned.outputs.version }}" = "${{ steps.upstream.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull new skills
        if: steps.check.outputs.skip == 'false'
        run: ./scripts/pull-skills.sh "${{ steps.upstream.outputs.tag }}" /tmp/new-skills

      - name: Pull previous skills for diff
        if: steps.check.outputs.skip == 'false'
        run: |
          cp -R skills/ /tmp/old-skills

      - name: Categorize changes
        if: steps.check.outputs.skip == 'false'
        id: diff
        run: |
          OLD_FILES=$(cd /tmp/old-skills && find . -type f | sort)
          NEW_FILES=$(cd /tmp/new-skills && find . -type f | sort)
          if [ "$OLD_FILES" != "$NEW_FILES" ]; then
            echo "structural=true" >> "$GITHUB_OUTPUT"
          else
            echo "structural=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update plugin.json
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 -c "
          import json
          with open('.claude-plugin/plugin.json', 'r+') as f:
              data = json.load(f)
              data['cmux_version'] = '${{ steps.upstream.outputs.version }}'
              parts = data['version'].split('.')
              parts[2] = str(int(parts[2]) + 1)
              data['version'] = '.'.join(parts)
              f.seek(0)
              json.dump(data, f, indent=2)
              f.write('\n')
              f.truncate()
          "

      - name: Auto-merge content-only changes
        if: steps.check.outputs.skip == 'false' && steps.diff.outputs.structural == 'false'
        run: |
          NEW_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up old skills, copy new ones
          rm -rf skills/
          cp -R /tmp/new-skills/* skills/ 2>/dev/null || true

          git add .claude-plugin/plugin.json skills/
          git commit -m "chore: sync cmux skills to v${{ steps.upstream.outputs.version }}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Open PR for structural changes
        if: steps.check.outputs.skip == 'false' && steps.diff.outputs.structural == 'true'
        run: |
          BRANCH="upstream-sync/${{ steps.upstream.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          rm -rf skills/
          cp -R /tmp/new-skills/* skills/ 2>/dev/null || true

          git add .claude-plugin/plugin.json skills/
          git commit -m "chore: sync cmux skills to v${{ steps.upstream.outputs.version }} (structural changes)"
          git push origin "$BRANCH"
          gh pr create \
            --title "Upstream sync: cmux v${{ steps.upstream.outputs.version }} (structural)" \
            --body "Structural changes detected in upstream skills. Review the diff before merging. After merging, tag the merge commit with the new version." \
            --label "upstream-sync"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
